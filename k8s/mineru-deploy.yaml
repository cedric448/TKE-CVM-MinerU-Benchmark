apiVersion: apps/v1
kind: Deployment
metadata:
  name: mineru
  labels:
    app: mineru
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mineru
  template:
    metadata:
      labels:
        app: mineru
    spec:
      nodeName: 172.21.80.123
      imagePullSecrets:
        - name: lily-tcr-secret
      containers:
        - name: mineru
          image: lily-tcr.tencentcloudcr.com/mineru/mineru-repo:latest
          command: ["mineru-api"]
          args: ["--host", "0.0.0.0", "--port", "8000"]
          ports:
            - containerPort: 8000
          resources:
            limits:
              nvidia.com/gpu: "1"
            requests:
              nvidia.com/gpu: "1"
          env:
            - name: MINERU_MODEL_SOURCE
              value: "local"
            - name: NVIDIA_REQUIRE_CUDA
              value: ""
            - name: NVIDIA_DISABLE_REQUIRE
              value: "1"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 180
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: mineru
  labels:
    app: mineru
spec:
  type: NodePort
  selector:
    app: mineru
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
